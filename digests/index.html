---
layout: default
title: 每日摘要
---

{% assign latest = site.digests | sort: "date" | last %}
{% if latest %}
<div class="digest-meta">
  来源检查: {{ latest.sources_checked }} &nbsp;·&nbsp;
  条目总数: {{ latest.entries_found }} &nbsp;·&nbsp;
  重点推荐: {{ latest.top_picks }} &nbsp;·&nbsp;
  扩展阅读: {{ latest.extended }}
</div>
{{ latest.content }}
{% else %}
<p class="meta">暂无摘要。</p>
{% endif %}
