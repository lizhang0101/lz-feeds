<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header>
    <nav class="tabs">
      <a href="{{ '/' | relative_url }}"
         {% if page.url == '/' or page.url == '/index.html' %}class="active"{% endif %}>
        lz-feeds
      </a>
      <a href="{{ '/reader/' | relative_url }}"
         {% if page.url contains '/reader/' %}class="active"{% endif %}>
        📡 RSS 阅读
      </a>
      <a href="{{ '/digests/' | relative_url }}"
         {% if page.url contains '/digests' %}class="active"{% endif %}>
        📰 每日摘要
      </a>
      <a href="{{ '/hotlist/' | relative_url }}"
         {% if page.url contains '/hotlist' %}class="active"{% endif %}>
        🔥 热榜
      </a>
    </nav>
  </header>
  <main>
    {{ content }}
  </main>
</body>
</html>
