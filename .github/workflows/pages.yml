name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - '_layouts/**'
      - '_includes/**'
      - '_digests/**'
      - '_hotlist/**'
      - '_data/**'
      - 'assets/**'
      - '*.md'
      - '*.html'
      - 'reader/**'
      - 'digests/**'
      - 'hotlist/**'
      - '_config.yml'
      - 'Gemfile'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll
        run: bundle exec jekyll build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - uses: actions/deploy-pages@v4
        id: deployment
