name: Daily Digest

on:
  schedule:
    - cron: '17 0 * * *'  # UTC 00:17 = 北京 08:17
  workflow_dispatch:       # 支持手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch feeds
        run: python scripts/fetch_feeds.py --hours 72 --web-cache data/web_seen.json --data-out _data/latest_entries.json

      - name: Summarize
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/summarize.py

      - name: Commit & push digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _digests/ _data/ data/
          git diff --cached --quiet || git commit -m "digest: $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy Pages
        run: gh workflow run pages.yml --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
