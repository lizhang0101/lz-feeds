name: Daily Digest

on:
  schedule:
    - cron: '0 1 * * *'  # UTC 01:00 = 北京 09:00
  workflow_dispatch:       # 支持手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch feeds
        run: python scripts/fetch_feeds.py --hours 72 --web-cache data/web_seen.json

      - name: Summarize
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/summarize.py

      - name: Commit & push digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/ data/
          git diff --cached --quiet || git commit -m "digest: $(date -u +%Y-%m-%d)"
          git push
