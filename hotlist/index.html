---
layout: default
title: 热榜
---

<h1>🔥 热榜</h1>

<ul class="index-list">
{% for item in site.hotlist %}
  <li>
    <a href="{{ item.url | relative_url }}">{{ item.name | remove: ".md" }}</a>
    {% if item.updated %}<span class="meta">&nbsp;{{ item.updated }}</span>{% endif %}
  </li>
{% endfor %}
{% if site.hotlist.size == 0 %}
  <li>暂无数据</li>
{% endif %}
</ul>
