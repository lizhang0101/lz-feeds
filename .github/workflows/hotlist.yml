name: Hot List

on:
  schedule:
    - cron: '0 */2 * * *'  # 每 2 小时
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hotlist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch hot lists
        run: python scripts/fetch_hotlist.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hotlist/
          git diff --cached --quiet || git commit -m "hotlist: $(date -u +%Y-%m-%dT%H:%M)Z"
          git push
